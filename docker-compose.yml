services:
  postgres:
    image: postgres:16-alpine
    container_name: leadspace-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: leadspace
      POSTGRES_PASSWORD: leadspace
      POSTGRES_DB: leadspace
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
